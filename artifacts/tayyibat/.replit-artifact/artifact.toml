kind = "web"
previewPath = "/"
title = "نظام الطيبات - Dr. Dhia Al-Awadi"
version = "1.0.0"
id = "artifacts/tayyibat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22917

[services.development]
run = "pnpm --filter @workspace/tayyibat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tayyibat", "run", "build" ]
publicDir = "artifacts/tayyibat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22917"
BASE_PATH = "/"
