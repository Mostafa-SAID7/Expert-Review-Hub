<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6D1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3C00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="180" height="180" rx="40" fill="url(#gradient)"/>
  
  <!-- Inner highlight circle for depth -->
  <circle cx="90" cy="45" r="60" fill="white" opacity="0.1"/>
  
  <!-- Central icon: review/checkmark symbol -->
  <g transform="translate(90, 90)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="45" fill="white" opacity="0.95" filter="url(#shadow)"/>
    
    <!-- Checkmark icon -->
    <path d="M -18 -2 L -8 8 L 18 -15" stroke="#FF6D1F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Decorative accent lines -->
    <line x1="-35" y1="-15" x2="-25" y2="-15" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="25" y1="15" x2="35" y2="15" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
